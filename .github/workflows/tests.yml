name: tests

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: apt-get update && apt-get install -y build-essential cmake git wget python3 python3-pip

      - name: Install Conan
        run: |
          pip3 install "conan>=2.0"
          conan --version

      - name: Create Conan Profile
        run: |
          conan profile detect --name default --force

      - name: Configure Conan
        run: conan install . --build=missing

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=./build/Release/generators/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run Tests 
        run: ctest --test-dir build --verbose
